<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <header><h1>Admin Panel</h1></header>
  <main class="admin">
    <section>
      <h2>Manage Categories</h2>
      <form id="form-add-cat">
        <input name="name" placeholder="Category Name" required />
        <button type="submit">Add Category</button>
      </form>
      <div>
        <select id="cat-delete-select"></select>
        <button id="btn-del-cat">Delete Selected Category</button>
      </div>
      <ul id="cat-list"></ul>
    </section>

    <section>
      <h2>Manage Products</h2>
      <form id="form-add-product" enctype="multipart/form-data">
        <label>Category: <select name="catid" id="prod-catid"></select></label>
        <label>Name: <input name="name" required /></label>
        <label>Price: <input type="number" step="0.01" name="price" required /></label>
        <label>Description:<br><textarea name="description" rows="3"></textarea></label>
        <label>Image: <input type="file" name="image" accept="image/*" /></label>
        <button type="submit">Insert Product</button>
      </form>

      <h3>Update Product (basic)</h3>
      <form id="form-update-product" enctype="multipart/form-data">
        <label>PID: <input name="id" type="number" required /></label>
        <label>Category: <select name="catid" id="upd-catid"><option value="">(no change)</option></select></label>
        <label>Name: <input name="name" /></label>
        <label>Price: <input type="number" step="0.01" name="price" /></label>
        <label>Description:<br><textarea name="description" rows="2"></textarea></label>
        <label>New Image: <input type="file" name="image" accept="image/*" /></label>
        <button type="submit">Update Product</button>
      </form>

      <h3>Delete Product</h3>
      <form id="form-del-product">
        <label>PID: <input name="id" type="number" required /></label>
        <button type="submit">Delete</button>
      </form>

      <h3>Current Products</h3>
      <div>
        Filter by Category: <select id="filter-catid"><option value="">All</option></select>
      </div>
      <table id="prod-table" border="1" cellpadding="6"></table>
    </section>
  </main>
  <script src="/js/admin.js"></script>
</body>
</html>
