<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Register</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>

  <!-- 保留你原有样式（与你上传的一致） -->
  <style>
    :root{
      --brand:#1976D2; --brand-d:#0d47a1;
      --bg:#f5f7fb; --text:#2c3e50;
      --muted:#6b7c93; --danger:#e74c3c;
      --border:#e0e4ee; --card:#fff;
      --radius:10px;
    }
    body{
      margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
      background:var(--bg); color:var(--text);
    }
    .topbar{
      background:var(--brand); color:#fff;
      padding:.9rem 1.2rem;
      display:flex; justify-content:space-between; align-items:center;
      box-shadow:0 2px 8px rgba(0,0,0,.12);
    }
    .topbar .title{ font-weight:700; letter-spacing:.3px }
    .topbar a{
      color:#fff; text-decoration:none;
      opacity:.9; font-size:.95rem;
    }
    .topbar a:hover{ opacity:1 }
    .page{
      min-height:calc(100vh - 60px);
      display:flex; justify-content:center; align-items:center;
      padding:2rem 1rem;
    }
    .card{
      width:min(430px, 92vw);
      background:var(--card);
      padding:1.5rem 1.6rem 1.9rem;
      border-radius:var(--radius);
      border:1px solid var(--border);
      box-shadow:0 10px 30px rgba(0,0,0,.06);
    }
    h2{
      margin:0 0 1.2rem;
      text-align:center;
      font-size:1.35rem;
    }
    #reg-form label{
      display:block;
      margin-bottom:.6rem;
      font-size:.92rem;
      color:var(--muted);
    }
    input{
      width:100%;
      max-width:360px;
      padding:.72rem .85rem;
      border:1px solid var(--border);
      border-radius:8px;
      font-size:1rem;
      outline:none;
      background:#fff;
      transition:border .15s, box-shadow .15s;
      box-sizing:border-box;
    }
    input:focus{
      border-color:var(--brand);
      box-shadow:0 0 0 3px rgba(25,118,210,.2);
    }
    .btn{
      width:100%;
      max-width:360px;
      padding:.78rem 1rem;
      background:var(--brand);
      color:#fff;
      border:none;
      border-radius:8px;
      cursor:pointer;
      font-weight:600;
      margin-top:.3rem;
    }
    .btn:hover{ background:var(--brand-d) }
    .msg{
      color:var(--danger);
      min-height:1.2rem;
      text-align:center;
      margin-top:.6rem;
    }
    .links{
      text-align:right;
      font-size:.92rem;
      margin-top:.4rem;
    }
    .links a{
      color:var(--brand);
      text-decoration:none;
    }
    .links a:hover{
      text-decoration:underline;
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="title">Shopping Account</div>
    <nav>
      <a href="/">← Back to Site</a>
    </nav>
  </div>

  <div class="page">
    <section class="card">
      <h2>Create an Account</h2>

      <form id="reg-form" novalidate>
        <label>Email
          <input type="email" name="email" required />
        </label>
        <label>Password
          <input type="password" name="password" required minlength="6"/>
        </label>
        <label>Repeat Password
          <input type="password" name="password2" required minlength="6"/>
        </label>
        <button class="btn" type="submit">Register</button>
      </form>

      <div id="msg" class="msg"></div>

      <div class="links">
        <a href="/login.html">← Back to Login</a>
      </div>
    </section>
  </div>

  <!-- 唯一变化：外链脚本 -->
  <script src="/js/register.js"></script>
</body>
</html>
