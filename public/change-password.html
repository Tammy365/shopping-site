<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Change Password</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <style>
    :root{
      --brand:#1976D2; --brand-d:#0d47a1;
      --bg:#f5f7fb; --text:#2c3e50;
      --muted:#6b7c93; --danger:#e74c3c;
      --border:#e0e4ee; --card:#fff;
      --radius:10px;
    }
    body{
      margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
      background:var(--bg);color:var(--text);
    }
    .topbar{
      background:var(--brand); color:#fff;
      padding:.9rem 1.2rem;
      display:flex; justify-content:space-between; align-items:center;
      box-shadow:0 2px 8px rgba(0,0,0,.12);
    }
    .topbar a{ color:#fff; text-decoration:none; opacity:.9 }
    .topbar a:hover{ opacity:1 }
    .ops{ display:flex; gap:.8rem }
    .btn{
      border:none;padding:.48rem .9rem;border-radius:8px;
      cursor:pointer;font-weight:600;background:#fff;color:var(--brand)
    }
    .btn:hover{background:#eef3ff}
    .danger{background:#e74c3c;color:#fff}
    .danger:hover{background:#c0392b}

    .page{
      min-height:calc(100vh - 60px);
      display:flex;justify-content:center;align-items:center;padding:2rem 1rem;
    }
    .card{
      width:min(450px,92vw);background:var(--card);
      border:1px solid var(--border);border-radius:var(--radius);
      padding:1.4rem 1.4rem 1.7rem;
      box-shadow:0 10px 30px rgba(0,0,0,.06);
    }
    h2{text-align:center;margin-top:0;margin-bottom:1.3rem}
    form{display:flex;flex-direction:column;gap:.9rem}
    label{font-size:.93rem;color:var(--muted)}
    input{
      padding:.7rem .8rem;border-radius:8px;border:1px solid var(--border);
      font-size:1rem;
    }
    input:focus{
      outline:none;border-color:var(--brand);
      box-shadow:0 0 0 3px rgba(25,118,210,.15)
    }
    .primary{
      padding:.75rem; border:none; border-radius:8px;
      background:var(--brand); color:#fff; font-weight:600; cursor:pointer;
    }
    .primary:hover{ background:var(--brand-d); }
    .msg{color:var(--danger);height:1.2rem;text-align:center;margin-top:.4rem}
    .back{ text-align:center; margin-top:1rem }
    .back a{ color:var(--brand); text-decoration:none }
    .back a:hover{text-decoration:underline}
  </style>
</head>
<body>
  <!-- 顶栏：Back to Site 可点击（修正为真正的 <a>） -->
  <div class="topbar">
    <a href="/">← Back to Site</a>
    <div class="ops">
      <button id="logout" class="btn danger">Logout</button>
    </div>
  </div>

  <div class="page">
    <div class="card">
      <h2>Change Password</h2>
      <form id="cp-form" novalidate>
        <label>Current Password
          <input type="password" name="current" required minlength="6"/>
        </label>
        <label>New Password
          <input type="password" name="password" required minlength="6"/>
        </label>
        <label>Repeat New Password
          <input type="password" name="password2" required minlength="6"/>
        </label>
        <button class="primary" type="submit">Update Password</button>
      </form>
      <div id="msg" class="msg"></div>

      <!-- 底部：Back to Site 可点击（修正为真正的 <a>） -->
      <div class="back">
        <a href="/">← Back to Site</a>
      </div>
    </div>
  </div>

  <!-- 关键：外链脚本（严格 CSP 下才能执行） -->
  <script src="/js/change-password.js"></script>
</body>
</html>
